services:
  # Backend API Service
  - type: web
    name: rocket-chat-backend
    env: node
    region: oregon
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8080
      - key: MONGO_URI
        sync: false  # User will add this in Render dashboard
      - key: FRONTEND_URL
        sync: false  # User will add this in Render dashboard (e.g., https://your-frontend.onrender.com)
      - key: FIREBASE_SERVICE_ACCOUNT
        sync: false  # User will add this in Render dashboard (JSON string)
    healthCheckPath: /health
    
  # Frontend Static Site
  - type: static
    name: rocket-chat-frontend
    env: static
    region: oregon
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/build
    envVars:
      - key: REACT_APP_API_URL
        sync: false  # User will add this in Render dashboard (e.g., https://your-backend.onrender.com)
      - key: REACT_APP_SOCKET_URL
        sync: false  # User will add this in Render dashboard (same as API_URL)
      - key: REACT_APP_FIREBASE_API_KEY
        sync: false
      - key: REACT_APP_FIREBASE_AUTH_DOMAIN
        sync: false
      - key: REACT_APP_FIREBASE_PROJECT_ID
        sync: false
      - key: REACT_APP_FIREBASE_STORAGE_BUCKET
        sync: false
      - key: REACT_APP_FIREBASE_MESSAGING_SENDER_ID
        sync: false
      - key: REACT_APP_FIREBASE_APP_ID
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
