name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # --- Lint & Validate Backend ---
  backend-check:
    name: Backend Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check for syntax errors
        run: node --check server/index.js

  # --- Build Frontend ---
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          CI: false
          REACT_APP_API_URL: https://placeholder.onrender.com
          REACT_APP_SOCKET_URL: https://placeholder.onrender.com

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/build
          retention-days: 7

  # --- Docker Build ---
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend-check]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t rocket-chat-backend .

      - name: Test Docker health check
        run: |
          docker run -d --name test-container \
            -e MONGO_URI=mongodb://localhost:27017/test \
            -e FIREBASE_SERVICE_ACCOUNT='{"type":"test"}' \
            -p 8080:8080 \
            rocket-chat-backend || true
          sleep 5
          docker logs test-container 2>&1 || true
          docker stop test-container || true
          docker rm test-container || true

  # --- Security Audit ---
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Backend audit
        run: npm audit --audit-level=critical || true

      - name: Frontend audit
        working-directory: frontend
        run: npm audit --audit-level=critical || true
